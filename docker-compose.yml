services:
  redis:
    image: redis:7-alpine
    container_name: demo-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

  app:
    image: node:20-alpine
    container_name: demo-node-redis
    working_dir: /app
    command: sh -c "npm install && npm start"
    environment:
      PORT: 3000
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
    depends_on:
      - redis
